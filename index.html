<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humans</title>

  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    header {
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 48px;
      margin: 0;
    }

    header p {
      opacity: 0.7;
      margin-top: 10px;
    }

    .form {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    input[type="email"] {
      padding: 12px;
      border-radius: 8px;
      border: none;
      width: 250px;
      outline: none;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      opacity: 0.8;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #ffffff;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      opacity: 0.5;
      pointer-events: none;
      transition: 0.2s;
    }

    button.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    footer {
      padding: 20px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: center;
      gap: 30px;
      font-size: 14px;
    }

    footer a {
      color: #ffffff;
      text-decoration: none;
      opacity: 0.7;
    }

    footer a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="container">

    <header>
      <h1>Humans</h1>
      <p>La vida pasa afuera. Y está pasando ahora.</p>

      <div class="form">
        <input type="email" id="email" placeholder="Tu email" />

        <div class="checkbox-container">
          <input type="checkbox" id="robotCheck" />
          <label for="robotCheck">No soy un robot</label>
        </div>

        <button id="submitBtn">Anotarme</button>
      </div>
    </header>

    <footer>
      <a href="/terminos.html">Términos</a>
      <a href="/privacidad.html">Privacidad</a>
      <a href="mailto:humansapp.oficial@gmail.com">Contacto</a>
    </footer>

  </div>

  <script>
    const emailInput = document.getElementById("email");
    const checkbox = document.getElementById("robotCheck");
    const button = document.getElementById("submitBtn");

    function validate() {
      const emailValid = emailInput.value.includes("@");
      const isChecked = checkbox.checked;

      if (emailValid && isChecked) {
        button.classList.add("enabled");
      } else {
        button.classList.remove("enabled");
      }
    }

    emailInput.addEventListener("input", validate);
    checkbox.addEventListener("change", validate);

    button.addEventListener("click", () => {
      if (!button.classList.contains("enabled")) return;

      alert("Te anotaste 👀");
      emailInput.value = "";
      checkbox.checked = false;
      validate();
    });
  </script>
</body>
</html>
