<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="shadow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.5" flood-color="rgba(0,0,0,0.65)" />
    </filter>
  </defs>

  <!-- Centro óptico ajustado -->
  <g transform="translate(32,38)">

    <!-- H al límite -->
    <text
      x="0"
      y="0"
      text-anchor="middle"
      dominant-baseline="middle"
      font-size="48"
      font-family="Plus Jakarta Sans, Inter, Arial, sans-serif"
      font-weight="800"
      fill="#FFFFFF"
      filter="url(#shadow)">
      H
    </text>

    <!-- Dot bien presente -->
    <circle
      cx="16"
      cy="-22"
      r="6"
      fill="#00E5FF">

      <animate
        attributeName="opacity"
        values="1;0.45;1"
        dur="1.6s"
        repeatCount="indefinite"/>

      <animate
        attributeName="r"
        values="6;5;6"
        dur="1.6s"
        repeatCount="indefinite"/>
        
    </circle>

  </g>

</svg>
